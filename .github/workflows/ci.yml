name: DeraineDB CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Set up Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.13.0

    - name: Build Core (Zig)
      run: cd core && zig build -Doptimize=ReleaseFast

    - name: Build Orchestrator (Go)
      run: go build -v ./...

    - name: Run Tests
      # Assuming we implement some Go tests later
      run: go test -v ./... || true
