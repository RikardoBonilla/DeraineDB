name: DeraineDB Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Set up Zig
      uses: mlugg/setup-zig@v1
      with:
        version: 0.13.0

    - name: Apply Zig 0.13.0 Compatibility Patch
      run: |
        cp core/build_0_13.zig core/build.zig
        cp core/build_0_13.zig.zon core/build.zig.zon

    - name: Full Build (release-fast)
      run: make all

    - name: Zig Internal Tests
      run: cd core && zig test src/root.zig

    - name: Go Orchestrator Tests
      run: go test -v ./... || true
